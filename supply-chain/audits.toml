[[audits.openssl]]
who = "kerberosmansour <13433538+kerberosmansour@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "0.10.79 -> 0.10.80"
notes = "Delta review for the GHSA-phqj-4mhp-q6mq fix (bump pulled in to clear the OSV gate). Only source change is in src/cipher_ctx.rs: the cipher_update_inplace output-buffer-size assertion is TIGHTENED from `inlen + block_size` to `cipher_update_output_size(inlen)`, fixing a slice buffer overflow with AES key-wrap-with-padding ciphers; adds a #[should_panic] regression test. No new unsafe blocks, powerful imports, or ambient capabilities; strictly security-positive. Reviewed via `cargo vet diff`."

