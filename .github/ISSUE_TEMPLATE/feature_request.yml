name: Feature request
description: Suggest a crate capability, security control, integration, or documentation improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, unsafe, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, API, docs, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: What threat, misuse case, or operational risk does this address?
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      multiple: true
      options:
        - Public API
        - Feature flag
        - Framework adapter
        - Threat model
        - Dev guide
        - CI / supply chain
        - Fuzzing / property tests
        - DAST / smoke service
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
