name: sca-review-loop-drill

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read
  checks: read
  id-token: write

concurrency:
  group: sca-review-loop-drill
  cancel-in-progress: false

jobs:
  review-loop-drill:
    name: review-loop-drill
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node (to run the bundled SCA brain)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Create drill base branch with vulnerable cargo dependency
        id: branches
        run: |
          set -euo pipefail
          base_branch="sca/drill-base-${GITHUB_RUN_ID}"
          head_branch="sca/drill-head-${GITHUB_RUN_ID}"
          git config user.name "sca-drill[bot]"
          git config user.email "sca-drill[bot]@users.noreply.github.com"
          git switch -c "$base_branch"
          mkdir -p dogfood/review-loop
          cat > dogfood/review-loop/Cargo.toml <<'EOF'
          [package]
          name = "sca-drill"
          version = "0.0.0"
          edition = "2021"
          publish = false

          [dependencies]
          time = "0.2.23"
          EOF
          cat > dogfood/review-loop/Cargo.lock <<'EOF'
          # This file is automatically @generated by Cargo.
          version = 3

          [[package]]
          name = "time"
          version = "0.2.23"
          EOF
          cat > osv-scanner.toml <<'EOF'
          [[sca_lockfile]]
          ecosystem = "crates.io"
          path = "dogfood/review-loop/Cargo.lock"
          parser = "Cargo.lock"
          package = "time"
          badVersion = "0.2.23"
          knownAdvisory = "RUSTSEC-2020-0071"
          fixture = true
          EOF
          # Ignore the scan/triage artifacts so no later `git add` (agent or
          # otherwise) can sweep them into the remediation PR. The remediation
          # plan is force-added (`git add -f`) when the PR is opened.
          printf '\n.cache/\nfindings.osv.json\n' >> .gitignore
          git add dogfood/review-loop/Cargo.toml dogfood/review-loop/Cargo.lock osv-scanner.toml .gitignore
          git commit -m "test: seed SCA review-loop drill cargo dependency"
          git push --set-upstream origin "$base_branch"
          {
            echo "base_branch=${base_branch}"
            echo "head_branch=${head_branch}"
          } >> "$GITHUB_OUTPUT"

      - name: Run drill scan and triage on base branch
        env:
          SCA_SCANNER_MODE: fixture
        run: |
          node tools/sca/dist/scan.mjs scan --output findings.osv.json
          node tools/sca/dist/triage.mjs triage \
            --findings findings.osv.json \
            --state .cache/sca-state/findings.json \
            --work-items .cache/sca-work-items.json \
            --events .cache/sca-events.json
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const workItems = JSON.parse(
            readFileSync(".cache/sca-work-items.json", "utf8"),
          ).workItems ?? [];
          const claimed = workItems.some(
            (item) => item.track === "emergency" && item.state === "in_progress",
          );
          if (!claimed) {
            console.error("drill did not produce a claimable emergency work item");
            process.exit(1);
          }
          NODE

      - name: Open intentionally incomplete drill remediation PR
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git switch -c "${{ steps.branches.outputs.head_branch }}"
          # Exercise the remediator (plan lands in .cache, which is gitignored).
          node tools/sca/dist/remediate.mjs remediate-emergency \
            --work-items .cache/sca-work-items.json \
            --output .cache/sca-remediation-plan.json
          # Open the incomplete PR with an EMPTY commit: the plan/artifacts are
          # never committed, so the only diff that ever appears in this PR is the
          # fixer's cargo bump — nothing for the reviewer to object to.
          git commit --allow-empty -m "test: open incomplete SCA remediation drill PR"
          git push --set-upstream origin "${{ steps.branches.outputs.head_branch }}"
          gh pr create \
            --base "${{ steps.branches.outputs.base_branch }}" \
            --head "${{ steps.branches.outputs.head_branch }}" \
            --title "test: SCA review-loop drill ${GITHUB_RUN_ID}" \
            --body "Disposable SCA reviewer/fixer loop drill. The initial PR intentionally carries the remediation plan but does not apply the dependency bump."
          pr_number="$(
            gh pr list \
              --state open \
              --head "${{ steps.branches.outputs.head_branch }}" \
              --json number \
              --jq '.[0].number'
          )"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Scrub scan artifacts from the worktree (deterministic)
        # The agentic fixer can run a force `git add` that bypasses both the
        # prompt and .gitignore. Remove every scan/triage artifact so there is
        # literally nothing for it to add — the PR can only contain the bump.
        run: |
          rm -f findings.osv.json
          rm -rf .cache
          git status --porcelain --untracked-files=all || true

      - name: Validate Claude credential mode
        id: claude_auth
        env:
          HAS_STATIC_CLAUDE_SECRET: ${{ secrets.ANTHROPIC_API_KEY != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_WIF_CLAUDE_CONFIG: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID != '' && vars.ANTHROPIC_ORGANIZATION_ID != '' }}
        run: |
          set -euo pipefail
          if [ "$HAS_STATIC_CLAUDE_SECRET" != "true" ] && [ "$HAS_WIF_CLAUDE_CONFIG" != "true" ]; then
            echo "::error::Configure exactly one Claude credential mode: preferred OIDC/WIF repo variables, or ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN secret."
            exit 1
          fi
          if [ "$HAS_STATIC_CLAUDE_SECRET" = "true" ] && [ "$HAS_WIF_CLAUDE_CONFIG" = "true" ]; then
            echo "::error::Both static Claude secrets and OIDC/WIF variables are configured. Refusing ambiguous token mode."
            exit 1
          fi
          if [ "$HAS_WIF_CLAUDE_CONFIG" = "true" ]; then
            echo "credential_mode=wif" >> "$GITHUB_OUTPUT"
          else
            echo "credential_mode=static-secret" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude drill reviewer must request changes
        uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          prompt: |
            You are the Track A SCA reviewer identity in an authorized SunLitSecurityLibraries drill.
            Review PR #${{ steps.open_pr.outputs.pr_number }}.
            The PR is intentionally empty so far — the dependency bump has NOT been applied yet.
            You MUST submit a request-changes review unless the PR bumps the vulnerable `time`
            crate from `0.2.23` to `0.2.25` in dogfood/review-loop/Cargo.toml and dogfood/review-loop/Cargo.lock.
            In the request-changes body, tell the fixer to make only that exact dependency change and no unrelated edits.
            Do not approve, merge, push, read secrets, or alter branch protection.
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
            --disallowedTools "Bash(gh pr merge:*),Bash(git push:*),Bash(gh secret:*)"

      - name: Assert reviewer requested changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          decision="$(gh pr view "${{ steps.open_pr.outputs.pr_number }}" --json reviewDecision --jq .reviewDecision)"
          if [ "$decision" != "CHANGES_REQUESTED" ]; then
            echo "::error::Drill expected Claude to request changes, got ${decision}."
            exit 1
          fi

      - name: Claude drill remediation fixer
        uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          prompt: |
            You are the bounded Track A remediation fixer in an authorized SunLitSecurityLibraries drill.
            Do exactly these steps on PR #${{ steps.open_pr.outputs.pr_number }}, then stop:
            1. Run `gh pr checkout ${{ steps.open_pr.outputs.pr_number }}`.
            2. In dogfood/review-loop/Cargo.toml change `time = "0.2.23"` to `time = "0.2.25"`.
            3. In dogfood/review-loop/Cargo.lock change the `time` package `version = "0.2.23"` to `version = "0.2.25"`.
            4. Stage ONLY the two files you changed:
               `git add dogfood/review-loop/Cargo.toml dogfood/review-loop/Cargo.lock`
               (do NOT `git add -A` — leftover .cache/ and findings.osv.json scan artifacts must stay unstaged).
            5. Run `git commit -m "fix: bump time to 0.2.25"`, then `git push`.
            Make no other edits. Do not merge, touch other files, secrets, or branch protection.
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Edit,MultiEdit,Bash(gh pr view:*),Bash(gh pr checkout:*),Bash(git diff:*),Bash(git status:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
            --disallowedTools "Bash(gh pr merge:*),Bash(osv-scanner fix:*),Bash(gh secret:*)"

      - name: Claude drill reviewer after fixer
        uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          prompt: |
            Re-review PR #${{ steps.open_pr.outputs.pr_number }} in one pass, then stop.
            Run `gh pr diff ${{ steps.open_pr.outputs.pr_number }}` once.
            If the diff shows `time` updated to `0.2.25` in BOTH dogfood/review-loop/Cargo.toml and
            dogfood/review-loop/Cargo.lock (and no unrelated changes), run exactly:
            `gh pr review ${{ steps.open_pr.outputs.pr_number }} --approve --body "Verified: time bumped to 0.2.25."`
            Otherwise run `gh pr review ${{ steps.open_pr.outputs.pr_number }} --request-changes --body "<reason>"`.
            Submit exactly one review and stop. Do not merge, push, read secrets, or alter branch protection.
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
            --disallowedTools "Bash(gh pr merge:*),Bash(git push:*),Bash(gh secret:*)"

      - name: Deterministic drill merge gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          decision="$(gh pr view "${{ steps.open_pr.outputs.pr_number }}" --json reviewDecision --jq .reviewDecision)"
          latest_approval_author="$(
            gh pr view "${{ steps.open_pr.outputs.pr_number }}" \
              --json reviews \
              --jq '[.reviews[] | select(.state == "APPROVED")] | last | .author.login // ""'
          )"
          if [ "$decision" != "APPROVED" ]; then
            echo "::error::Required Claude reviewer approval missing after fixer: ${decision}"
            exit 1
          fi
          if [ "$latest_approval_author" != "claude" ] && [ "$latest_approval_author" != "claude[bot]" ]; then
            echo "::error::Required Claude reviewer approval missing: latest approval author is ${latest_approval_author:-none}"
            exit 1
          fi
          gh pr checkout "${{ steps.open_pr.outputs.pr_number }}"
          grep -q 'version = "0.2.25"' dogfood/review-loop/Cargo.lock
          grep -q '0.2.25' dogfood/review-loop/Cargo.toml
          gh pr merge "${{ steps.open_pr.outputs.pr_number }}" --squash --delete-branch

      - name: Cleanup drill branches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin --delete "${{ steps.branches.outputs.head_branch }}" || true
          git push origin --delete "${{ steps.branches.outputs.base_branch }}" || true
