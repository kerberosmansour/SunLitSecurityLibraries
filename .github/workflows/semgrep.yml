name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Semgrep Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Semgrep
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/semgrep-venv"
          . "$RUNNER_TEMP/semgrep-venv/bin/activate"
          python -m pip install --disable-pip-version-check --no-input semgrep==1.161.0

      - name: Semgrep Rust scan
        shell: bash
        run: |
          set -euo pipefail
          . "$RUNNER_TEMP/semgrep-venv/bin/activate"
          semgrep scan \
            --config p/rust \
            --config p/owasp-top-ten \
            --metrics=off \
            --error \
            --sarif \
            --output semgrep.sarif \
            --exclude target \
            --exclude .git \
            .

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: ${{ github.event.repository.private == false && github.event_name != 'pull_request' && always() && hashFiles('semgrep.sarif') != '' }}
        with:
          sarif_file: semgrep.sarif
          category: semgrep-rust
