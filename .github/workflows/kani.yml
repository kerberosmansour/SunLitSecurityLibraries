name: Kani

# Advisory Kani model-checking lane.
#
# Runs on every PR and push to main. Failures do NOT block merges in M1
# (`continue-on-error: true`). Promotion to a blocking gate is a separate
# follow-up after >=1 release cycle of stable signal — see
# `docs/dev-guide/formal-verification.md` for the criteria.
#
# Runtime cap: 15 minutes per the research dossier
# (`docs/slo/research/formal-verification-kani-tla/synthesis.md`).
#
# Pin: cargo install --locked kani-verifier --version 0.62.0. Bumping the
# pin is a deliberate runbook change so CI behaviour is reproducible
# from the workspace's pinned version.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kani:
    name: Kani (advisory)
    runs-on: ubuntu-latest
    # Advisory: failures surface yellow on the PR but do not block merge.
    # Promotion to blocking is a separate follow-up runbook.
    continue-on-error: true
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # M1 ships one bootstrap proof on `secure_data`. M2 extends to
        # `secure_authz` and `secure_boundary`; M3 extends to `secure_errors`.
        # Each new harness adds a row here; keep the matrix small so the
        # 15-min cap is per-crate, not per-proof.
        crate: [secure_data]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Kani (pinned)
        shell: bash
        env:
          KANI_VERSION: "0.62.0"
        run: |
          set -euo pipefail
          cargo install --locked kani-verifier --version "${KANI_VERSION}"
          # `cargo kani setup` downloads CBMC and the Kani toolchain; this
          # writes to ~/.kani/<version>/ — cached by Swatinem on rerun.
          cargo kani setup

      - name: Run Kani proofs
        shell: bash
        run: |
          set -euo pipefail
          echo "--- Kani version ---"
          cargo kani --version
          echo "--- harnesses for ${{ matrix.crate }} ---"
          # Kani 0.62's assertion reachability checks report the bootstrap
          # invariant assertions as unreachable on this pinned toolchain.
          cargo kani -p "${{ matrix.crate }}" --output-format old --no-assertion-reach-checks

      - name: Surface result regardless of pass/fail
        if: always()
        shell: bash
        run: |
          # Always print the per-harness summary, even on failure, so
          # reviewers can see which proof regressed without re-running.
          if [ -d "target/kani" ]; then
            echo "--- target/kani contents ---"
            ls -la target/kani || true
          fi
