# Dastardly (Burp Suite) DAST scan workflow for SunLit Security Libraries
#
# Runs Dastardly from PortSwigger against the secure_smoke_service.
# This is the CI DAST lane for pull requests and main.
# Triggered on push/PR to main, and manually via workflow_dispatch.

name: Dastardly DAST Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dastardly-scan:
    name: Dastardly (Burp Suite) Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dastardly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dastardly-

      - name: Build smoke service
        run: cargo build -p secure_smoke_service

      - name: Start smoke service
        run: |
          cargo run -p secure_smoke_service &
          echo "SMOKE_PID=$!" >> "$GITHUB_ENV"

          # Wait for service to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/health; then
              echo ""
              echo "Smoke service is healthy."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Smoke service did not start in 30 seconds."
              exit 1
            fi
            sleep 1
          done

      - name: Run Dastardly scan
        continue-on-error: true
        uses: PortSwigger/dastardly-github-action@be689170753f3243af6c7e87c1eaa5b89d91205d # main on 2026-05-04
        with:
          target-url: 'http://localhost:3001/dast-index'
          output-filename: dastardly-report.xml

      - name: Publish Dastardly results
        if: always()
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: '**/dastardly-report.xml'
          # Dastardly publishes an empty testsuite when no issues are found;
          # the reporter must not treat that as a failure. `fail_on_failure`
          # still makes the job fail when Dastardly DOES report a finding.
          require_tests: false
          fail_on_failure: true

      - name: Upload Dastardly report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dastardly-report
          path: dastardly-report.xml
          retention-days: 30

      - name: Stop smoke service
        if: always()
        run: |
          if [ -n "${SMOKE_PID:-}" ]; then
            kill "$SMOKE_PID" 2>/dev/null || true
          fi
