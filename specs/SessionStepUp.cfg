\* TLC config for the Hardened SessionStepUp spec.
\* Bound: small enough to be tractable; large enough that Naive (with
\* the step-up gate removed) finds the privileged-action-without-step-up
\* counterexample.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    MaxSessionTicks        = 5
    MaxStepUpTicks         = 2
    MaxPrivActionAttempts  = 3

INVARIANTS
    TypeOK
    NoPrivWithoutStepUp
    NoExpiredReuse
    StepUpWindowEnforced
