\* TLC config for the NAIVE variant of SessionStepUp.
\*
\* TLC MUST find a counterexample under this config — the
\* NoPrivWithoutStepUp invariant is "privActionAccepted = 0" in the
\* Naive module, and the NaivePrivActionAttempt action increments the
\* counter from any non-Expired state, including Auth. The first
\* `Login → NaivePrivActionAttempt` sequence violates it.
\*
\* If TLC reports "no error" under this config, the Naive variant is
\* too abstract — file an issue and tighten the model.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    MaxSessionTicks        = 5
    MaxStepUpTicks         = 2
    MaxPrivActionAttempts  = 3

INVARIANTS
    TypeOK
    NoPrivWithoutStepUp
