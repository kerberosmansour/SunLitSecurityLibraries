\* TLC config for the NAIVE CircuitBreaker variant.
\*
\* TLC must find a counterexample on NoDoubleProbe — the Naive design
\* permits two callers to be in callerActive simultaneously.

SPECIFICATION Spec

CONSTANTS
    NumCallers = 2
    MaxFailures = 2
    MaxOpenTicks = 2

INVARIANTS
    TypeOK
    NoDoubleProbe
